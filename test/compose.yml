services:
  jottacloud:
    image: jottacloud:test
    container_name: jottacloud-test
    env_file: .env
    environment:
      - JOTTA_DEVICE=integration-test
      - JOTTA_CONFIG_SCANINTERVAL=1m
      - STARTUP_TIMEOUT=30
      - LOCALTIME=Europe/Stockholm
    volumes:
      - ./data/jottad:/data/jottad
      - ./backup:/backup
      - ./sync:/sync
    ports:
      - "14443:14443"
