services:
  jottacloud:
    image: jottacloud:test
    container_name: jottacloud-test
    env_file: .env
    environment:
      - JOTTA_DEVICE=integration-test
      - JOTTA_SCANINTERVAL=1m
      - STARTUP_TIMEOUT=30
      - LOCALTIME=Europe/Stockholm
    volumes:
      - ./data/jottad:/data/jottad
      - ./data/jotta-cli:/data/jotta-cli
      - ./backup:/backup
      - ./sync:/sync
      - ./config/ignorefile:/config/ignorefile:ro
    ports:
      - "14443:14443"
