name: Check for New Jottacloud CLI Version

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest jotta-cli version from APT repo
        id: apt
        run: |
          VERSION=$(curl -fsSL https://repo.jotta.cloud/debian/dists/debian/main/binary-amd64/Packages \
            | awk '
                $1 == "Package:" && $2 == "jotta-cli" { in_pkg=1; next }
                $1 == "Package:" && $2 != "jotta-cli" { in_pkg=0 }
                in_pkg && $1 == "Version:" { print $2; exit }
              ')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Found APT version: $VERSION"

      - name: Check whether release tag already exists
        id: release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.apt.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG does not exist"
          fi

      - name: Create release if version is new
        if: steps.apt.outputs.version != '' && steps.release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.apt.outputs.version }}"
          echo "Creating release $TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Jottacloud CLI ${{ steps.apt.outputs.version }}" \
            --latest